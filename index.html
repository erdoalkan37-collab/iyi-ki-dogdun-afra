<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İyi ki Doğdun Afra ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(180deg,#090909,#2a0000,#000);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

#intro{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
animation:intro 3s forwards;
z-index:9999;
}

@keyframes intro{
0%{opacity:1;}
70%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

.container{
text-align:center;
padding:20px;
z-index:2;
}

h1{
font-size:50px;
color:#ff2e63;
text-shadow:0 0 10px red,0 0 20px red,0 0 40px red;
animation:parla 2s infinite alternate;
}

@keyframes parla{
from{transform:scale(1);}
to{transform:scale(1.05);}
}

.message{
margin-top:20px;
font-size:22px;
max-width:700px;
line-height:1.8;
}

button{
margin-top:30px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:50px;
background:#ff2e63;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

.heart,.star{
position:fixed;
pointer-events:none;
}

.heart{
color:#ff0040;
animation:fly linear infinite;
}

.star{
color:white;
animation:twinkle 2s infinite;
}

@keyframes fly{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-120vh);
opacity:0;
}
}

@keyframes twinkle{
50%{
opacity:.2;
transform:scale(.4);
}
}

#rose{
position:fixed;
font-size:120px;
animation:rose 4s forwards;
z-index:5;
}

@keyframes rose{
0%{
transform:scale(0);
opacity:0;
}
30%{
transform:scale(1);
opacity:1;
}
100%{
transform:translateY(-250px);
opacity:0;
}
}
</style>
</head>

<body>

<div id="intro">❤️ Hoş Geldin ❤️</div>

<div id="rose">🌹</div>

<div class="container">

<h1>🎂 İyi ki Doğdun Afra 🎂</h1>

<div class="message">
Bugün senin günün...<br><br>

Hayatına sağlık, mutluluk ve kahkahalar dolsun.<br>

İyi ki varsın.<br>

Umarım tüm hayallerin gerçek olur. ❤️
</div>
