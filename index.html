<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İyi ki Doğdun Afra ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(180deg,#090909,#2a0000,#000);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

#intro{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
animation:intro 3s forwards;
z-index:9999;
}

@keyframes intro{
0%{opacity:1;}
70%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

.container{
text-align:center;
padding:20px;
z-index:2;
}

h1{
font-size:50px;
color:#ff2e63;
text-shadow:0 0 10px red,0 0 20px red,0 0 40px red;
animation:parla 2s infinite alternate;
}

@keyframes parla{
from{transform:scale(1);}
to{transform:scale(1.05);}
}

.message{
margin-top:20px;
font-size:22px;
max-width:700px;
line-height:1.8;
}

button{
margin-top:30px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:50px;
background:#ff2e63;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

.heart,.star{
position:fixed;
pointer-events:none;
}

.heart{
color:#ff0040;
animation:fly linear infinite;
}

.star{
color:white;
animation:twinkle 2s infinite;
}

@keyframes fly{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-120vh);
opacity:0;
}
}

@keyframes twinkle{
50%{
opacity:.2;
transform:scale(.4);
}
}

#rose{
position:fixed;
font-size:120px;
animation:rose 4s forwards;
z-index:5;
}

@keyframes rose{
0%{
transform:scale(0);
opacity:0;
}
30%{
transform:scale(1);
opacity:1;
}
100%{
transform:translateY(-250px);
opacity:0;
}
}
</style>
</head>

<body>

<div id="intro">❤️ Hoş Geldin ❤️</div>

<div id="rose">🌹</div>

<div class="container">

<h1>🎂 İyi ki Doğdun Afra 🎂</h1>

<div class="message">
Bugün senin günün...<br><br>

Hayatına sağlık, mutluluk ve kahkahalar dolsun.<br>

İyi ki varsın.<br>

Umarım tüm hayallerin gerçek olur. ❤️
</div>

<button onclick="muzik()">🎵 Müziği Başlat</button>

<audio id="music" loop>
<source src="yeniden.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function muzik(){
document.getElementById("music").play();
confetti();
}

function heart(){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(15+Math.random()*35)+"px";
h.style.animationDuration=(4+Math.random()*5)+"s";
document.body.appendChild(h);

setTimeout(()=>h.remove(),9000);
}

setInterval(heart,200);

function star(){
let s=document.createElement("div");
s.className="star";
s.innerHTML="✨";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.fontSize=(10+Math.random()*15)+"px";
document.body.appendChild(s);
}

for(let i=0;i<80;i++)star();

document.addEventListener("click",e=>{
for(let i=0;i<100;i++){

let h=document.createElement("div");
h.innerHTML="💖";
h.style.position="fixed";
h.style.left=e.clientX+"px";
h.style.top=e.clientY+"px";
h.style.fontSize="25px";

let x=(Math.random()-0.5)*700;
let y=(Math.random()-0.5)*700;

h.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{
duration:1800
});

document.body.appendChild(h);

setTimeout(()=>h.remove(),1800);

}
});

function confetti(){

for(let i=0;i<200;i++){

let c=document.createElement("div");

c.innerHTML="🎉";

c.style.position="fixed";
c.style.left=Math.random()*100+"vw";
c.style.top="-30px";
c.style.fontSize="25px";

c.animate([
{transform:"translateY(0) rotate(0deg)"},
{transform:`translateY(${window.innerHeight+100}px) rotate(720deg)`}
],{
duration:3000
});

document.body.appendChild(c);

setTimeout(()=>c.remove(),3000);

}

}

</script>

</body>
</html>
